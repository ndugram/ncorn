version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: daily
    groups:
      actions:
        patterns:
          - "*"
    commit-message:
      prefix: ⬆️

  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: monthly
    groups:
      python-deps:
        patterns:
          - "*"
    commit-message:
      prefix: ⬆️