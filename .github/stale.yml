name: 'Close stale issues and PRs'

on:
  schedule:
    - cron: '0 0 * * 0'

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-issue-stale: 60
          days-before-issue-close: 7
          stale-issue-message: 'This issue has been automatically marked as stale because it has not had activity in the last 60 days. It will be closed in 7 days if no further activity occurs.'
          close-issue-message: 'This issue was closed because it was stale.'
          stale-issue-label: 'stale'
          
          days-before-pr-stale: 60
          days-before-pr-close: 7
          stale-pr-message: 'This PR has been automatically marked as stale because it has not had activity in the last 60 days. It will be closed in 7 days if no further activity occurs.'
          close-pr-message: 'This PR was closed because it was stale.'
          stale-pr-label: 'stale'
          
          exempt-issue-labels: 'pinned,security,enhancement'
          exempt-pr-labels: 'pinned,security,enhancement'
          
          operations-per-run: 100