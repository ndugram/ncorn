name: Release & Publish

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Get version from pyproject
        id: version
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_ENV
      
      - name: Check if tag already exists
        id: tag_check
        run: |
          TAG="v${{ env.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping release"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Create tag and release
        if: steps.tag_check.outputs.skip == 'false'
        run: |
          TAG="v${{ env.version }}"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        if: steps.tag_check.outputs.skip == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ env.version }}
          name: v${{ env.version }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        if: steps.tag_check.outputs.skip == 'false'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        if: steps.tag_check.outputs.skip == 'false'
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          
      - name: Build package
        if: steps.tag_check.outputs.skip == 'false'
        run: python -m build
        
      - name: Publish to PyPI
        if: steps.tag_check.outputs.skip == 'false'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          twine upload dist/*

      - name: Send Telegram notification
        if: steps.tag_check.outputs.skip == 'false'
        run: |
          TAG="v${{ env.version }}"
          MESSAGE="🚀 *Release Published!*

            📦 *Package:* ncorn ${TAG}

            📝 *Description:* ASGI web server for FastAPI applications

            👤 *Author:* ${{ github.actor }}
            🕐 *Time:* ${{ github.event.head_commit.timestamp }}"

          KEYBOARD='{"inline_keyboard":[[{"text":"📦 PyPI","url":"https://pypi.org/project/ncorn/"},{"text":"📖 Docs","url":"https://ncorn.ndugram.dev"},{"text":"💻 GitHub","url":"https://github.com/'${GITHUB_REPOSITORY}'/releases/tag/'${TAG}'"}]]}'

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=${MESSAGE}" \
            -d "parse_mode=Markdown" \
            --data-urlencode "reply_markup=${KEYBOARD}"